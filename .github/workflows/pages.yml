name: build & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Native GitHub Pages deploy — uses this repo's own token, no deploy key / no cross-repo push.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: install nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: build site (pinned hugo via the flake)
        run: |
          nix build -L .#dist
          mkdir -p _site
          cp -rL result/. _site/

      - name: setup pages
        uses: actions/configure-pages@v5

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
